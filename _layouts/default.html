<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — Benji App</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --surface: #1c1c1e;
      --border: #2c2c2e;
      --text: #f5f5f7;
      --muted: #a1a1a6;
      --link: #4db8ff;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    h1 { font-size: 1.85rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: -0.01em; }
    h2 { font-size: 1.3rem; font-weight: 600; margin-top: 2rem; letter-spacing: -0.005em; }
    h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1.5rem; }
    p { margin: 0.75rem 0; }
    ul { padding-left: 1.25rem; }
    li { margin-bottom: 0.4rem; }
    strong { font-weight: 600; color: var(--text); }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0 1.25rem;
    }
    .lang-switch {
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  {% if page.lang_switch %}
  <div class="lang-switch">{{ page.lang_switch }}</div>
  {% endif %}
  {{ content }}
</body>
</html>
